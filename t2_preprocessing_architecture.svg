  <text x="126" y="283" class="small">Control</text><rect x="199" y="270" width="92" height="16" rx="3" fill="#4e8e72"/><text x="298" y="284" class="small">110</text>
  <text x="126" y="317" class="small">Prodromal</text><rect x="199" y="304" width="49" height="16" rx="3" fill="#8fba9f"/><text x="255" y="318" class="small">58</text>
