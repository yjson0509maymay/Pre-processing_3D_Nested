    <rect x="558" y="232" width="162" height="146" rx="10" fill="#edf3ef" stroke="#9cb5a6"/>
    <ellipse cx="639" cy="301" rx="47" ry="57" fill="#2f3432"/><ellipse cx="639" cy="302" rx="32" ry="45" fill="#cbd3cf"/><path d="M639 257 v90 M615 275 Q639 288 663 275 M612 318 Q639 304 666 318" stroke="#fff" fill="none" opacity=".65"/>
