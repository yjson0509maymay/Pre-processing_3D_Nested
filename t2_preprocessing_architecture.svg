    <rect x="356" y="232" width="162" height="146" rx="10" fill="#edf3ef" stroke="#9cb5a6"/>
    <path d="M386 266 h72 l28 28 v55 h-100z" fill="#fff" stroke="#4d7664" stroke-width="2"/><path d="M458 266 v29 h28" fill="none" stroke="#4d7664" stroke-width="2"/>
