  <!-- service row -->
  <g class="body">
    <text x="114" y="491"><tspan font-weight="700">1. 선정 기준</tspan><tspan x="126" dy="27">• Modality = MRI, Type = Original</tspan><tspan x="126" dy="25">• T2 / PD-T2 / dual TSE 계열</tspan><tspan x="126" dy="25">• FLAIR, T2*, REPEAT, MPR 제외</tspan><tspan x="114" dy="34" font-weight="700">2. 중복 제어</tspan><tspan x="126" dy="27">• Subject·Image ID 중복 검증</tspan><tspan x="126" dy="25">• BL 및 표준 촬영 우선</tspan></text>
    <text x="354" y="491"><tspan font-weight="700">원천 영상 변환</tspan><tspan x="354" dy="31">• DICOM 폴더 인벤토리</tspan><tspan x="354" dy="26">• 다중 Echo 시 최대 TE 선택</tspan><tspan x="354" dy="26">• 4D 결과는 마지막 볼륨 사용</tspan><tspan x="354" dy="26">• 최대 3D 볼륨 채택</tspan></text>
    <text x="556" y="491"><tspan font-weight="700">Brain extraction</tspan><tspan x="556" dy="31">• 뇌 실질 영역 분리</tspan><tspan x="556" dy="26">• 배경·두개골 제거</tspan><tspan x="556" dy="26">• 다음 단계 입력 생성</tspan></text>
    <text x="758" y="491"><tspan font-weight="700">Intensity correction</tspan><tspan x="758" dy="31">• 저주파 편향장 추정</tspan><tspan x="758" dy="26">• 공간적 명암 편차 보정</tspan><tspan x="758" dy="26">• 조직 대비 안정화</tspan></text>
    <text x="960" y="491"><tspan font-weight="700">Spatial registration</tspan><tspan x="960" dy="31">• MNI152 1 mm template</tspan><tspan x="960" dy="26">• 12 자유도 affine 정합</tspan><tspan x="960" dy="26">• 피험자 간 공간 표준화</tspan></text>
    <text x="1162" y="491"><tspan font-weight="700">Model-ready volume</tspan><tspan x="1162" dy="31">• 비영점 voxel z-score</tspan><tspan x="1162" dy="26">• 범위 [-5, 5] clipping</tspan><tspan x="1162" dy="26">• 56³ voxel 크기 통일</tspan></text>
    <text x="1364" y="491"><tspan font-weight="700">품질·실행 관리</tspan><tspan x="1364" dy="31">• 샘플별 성공/실패 기록</tspan><tspan x="1364" dy="26">• 단계별·전체 처리시간</tspan><tspan x="1364" dy="26">• 시상/관상/축상면 시각화</tspan><tspan x="1364" dy="26">• Before/After 및 전체 파이프라인</tspan></text>
  </g>

  <!-- technology row -->
  <g class="body">
    <text x="114" y="730"><tspan font-weight="700">데이터/검증</tspan><tspan x="114" dy="31">Python · CSV · XLSX</tspan><tspan x="114" dy="27">메타데이터 교차검증</tspan><tspan x="114" dy="27">Control=0 · Prodromal=1 · PD=2</tspan></text>
    <text x="354" y="730"><tspan font-weight="700">dicom2nifti</tspan><tspan x="354" dy="31">pydicom · nibabel</tspan><tspan x="354" dy="27">reorient · gzip NIfTI</tspan></text>
    <text x="556" y="730"><tspan font-weight="700">FSL BET</tspan><tspan x="556" dy="31">Skull stripping</tspan><tspan x="556" dy="27">WSL / Linux</tspan></text>
    <text x="758" y="730"><tspan font-weight="700">ANTs N4</tspan><tspan x="758" dy="31">N4BiasFieldCorrection</tspan><tspan x="758" dy="27">Bias correction</tspan></text>
    <text x="960" y="730"><tspan font-weight="700">FSL FLIRT</tspan><tspan x="960" dy="31">MNI152_T1_1mm_brain</tspan><tspan x="960" dy="27">12-DOF affine</tspan></text>
    <text x="1162" y="730"><tspan font-weight="700">NumPy · nibabel</tspan><tspan x="1162" dy="31">z-score normalization</tspan><tspan x="1162" dy="27">3D resize (56³)</tspan></text>
    <text x="1364" y="730"><tspan font-weight="700">병렬 처리 및 QC</tspan><tspan x="1364" dy="31">ProcessPoolExecutor (4 workers)</tspan><tspan x="1364" dy="27">Matplotlib · preprocessing_log.csv</tspan><tspan x="1364" dy="27">단계 폴더 01–06 · 재시작 지원</tspan></text>
  </g>

  <text x="1560" y="893" text-anchor="end" class="small">PPMI T2 MRI · 303 unique subjects · Paper-aligned preprocessing</text>
